<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="sketchD favicon">
  <title>sketchD</title>
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#0a0a0c"/>
  <!-- simplified pencil body — filled rect for tiny rendering -->
  <rect x="6" y="5" width="5" height="14" fill="#d4c4a0"/>
  <!-- pencil tip -->
  <path d="M6 19 L8.5 24 L11 19 Z" fill="#d4c4a0"/>
  <!-- trail dots + solid line -->
  <circle cx="15" cy="24" r="1" fill="#d4c4a0" fill-opacity="0.7"/>
  <circle cx="18.5" cy="24" r="1.2" fill="#d4c4a0" fill-opacity="0.9"/>
  <line x1="21.5" y1="24" x2="27" y2="24" stroke="#d4c4a0" stroke-width="2" stroke-linecap="round"/>
</svg>
